name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build
        run: |
          xcodebuild build \
            -scheme Wavelength \
            -project Wavelength.xcodeproj \
            -destination 'generic/platform=iOS'
